services:
  # 1. Node.js Backend Server
  - type: web
    name: veda-backend
    env: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    plan: free # Change this if you need more resources
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false # You must set this manually in the Render Dashboard
      - key: GEMINI_API_KEY
        sync: false # You must set this manually in the Render Dashboard
      - key: REDIS_HOST
        fromService:
          type: redis
          name: veda-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: redis
          name: veda-redis
          property: port

  # 2. Redis Cache Server (For BullMQ Job Queues)
  - type: redis
    name: veda-redis
    plan: free
    ipAllowList: [] # Allows only internal Render services to connect for security
