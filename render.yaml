services:
  - type: web
    name: veda-backend
    env: node
    plan: free
    buildCommand: "cd backend && npm install && npm run build"
    startCommand: "cd backend && npm start"
    envVars:
      - key: PORT
        value: 10000
      - key: REDIS_HOST
        fromService:
          type: redis
          name: veda-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: redis
          name: veda-redis
          property: port
      # We define these without values so Render prompts you to fill them in the dashboard
      - key: MONGO_URI
        sync: false
      - key: GEMINI_API_KEY
        sync: false

  - type: redis
    name: veda-redis
    plan: free
    maxmemoryPolicy: noeviction
